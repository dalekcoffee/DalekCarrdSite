<style>
#clock-container {
  display: flex;
  justify-content: center;
  width: 100%;
  box-sizing: border-box;
  padding: 0.5rem 0;
}

#clock-wrapper {
  display: flex;
  flex-direction: column;
  align-items: center;
  font-family: 'Inter', sans-serif;
  font-weight: 900;
  text-transform: uppercase;
  color: #ffffff;

  -webkit-text-stroke: 3.5px #000;
  paint-order: stroke fill;

  font-variant-numeric: tabular-nums;
  font-size: 16px;
  letter-spacing: 0.15em;
  line-height: 1.35;
  white-space: nowrap;
}

#my-clock {
  margin-bottom: 0px;
  width: 100%;
  text-align: center;
}

.clock-row {
  display: flex;
  align-items: center;
  width: 100%;
  gap: 12px;
  margin-bottom: 4px;
}

.row-label {
  flex: 1;
  text-align: right;
  font-size: 0.85em;
  letter-spacing: 0.12em;
}

.row-content {
  flex: 1;
  text-align: left;
  display: flex;
  align-items: center;
  gap: 8px;
}

/* Pill styling shared by status, activity, and the pill-variant MOTD */
#status-badge, #activity-badge, .motd-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 3px 14px;
  border-radius: 999px;
  border: 2px solid currentColor;
  box-shadow: 0 0 0 2px #000;

  font-size: 0.8em;
  font-weight: 800;
  background: rgba(0, 0, 0, 0.75);

  -webkit-text-stroke: 0px transparent !important;
  text-shadow: none !important;
}

.badge-icon, .activity-icon {
  font-style: normal !important;
  display: inline-block;
  line-height: 1;
}

#status-badge[data-status="online"]  { color: #43b581; }
#status-badge[data-status="idle"]    { color: #faa81a; }
#status-badge[data-status="dnd"]     { color: #f04747; }
#status-badge[data-status="offline"] { color: #bbb; }
#activity-badge { color: #ffffff; border-color: #ffffff; }
.motd-pill      { color: #ffffff; border-color: #ffffff; }

/* Plain MOTD row inherits the wrapper's white-stroke sticker treatment */
#motd-plain-text {
  display: inline-block;
}

.blink {
  animation: pulse-opacity 1s step-end infinite;
}

@keyframes pulse-opacity {
  0%, 100% { opacity: 1; }
  50%      { opacity: 0; }
}

.hidden { display: none !important; }

@media screen and (max-width: 768px) {
  #clock-wrapper {
    font-size: 12px;
    -webkit-text-stroke: 2.5px #000;
  }
  .clock-row {
    gap: 8px;
  }
  .row-content {
    gap: 6px;
  }
  #status-badge, #activity-badge, .motd-pill {
    padding: 2px 10px;
    border-width: 1.5px;
    box-shadow: 0 0 0 1.5px #000;
  }
}
</style>

<div id="clock-container">
  <div id="clock-wrapper">
    <div id="my-clock">MY TIME: --<span class="blink">:</span>-- --- ---</div>

    <div class="clock-row">
      <span class="row-label">CURRENTLY:</span>
      <div class="row-content">
        <span id="status-badge" data-status="offline">
          <i class="badge-icon">○</i>
          <span id="status-text">···</span>
        </span>
        <span id="activity-badge" class="hidden">
          <i class="activity-icon">🎮</i>
          <span id="activity-text"></span>
        </span>
      </div>
    </div>

    <div id="motd-plain-row" class="clock-row hidden">
      <span class="row-label">MOTD:</span>
      <div class="row-content">
        <span id="motd-plain-text"></span>
      </div>
    </div>

    <div id="motd-pill-row" class="clock-row hidden">
      <span class="row-label">MOTD:</span>
      <div class="row-content">
        <span class="motd-pill">
          <span id="motd-pill-text"></span>
        </span>
      </div>
    </div>
  </div>
</div>

<script>
(function () {
  const myEl       = document.getElementById('my-clock');
  const badge      = document.getElementById('status-badge');
  const badgeIcon  = badge.querySelector('.badge-icon');
  const badgeText  = document.getElementById('status-text');
  const actBadge   = document.getElementById('activity-badge');
  const actIcon    = actBadge.querySelector('.activity-icon');
  const actText    = document.getElementById('activity-text');

  const MAIN_ID = '252367431274725377';
  const WORK_ID = '1476219861289144394';
  const MOTD_URL = 'https://dalekcoffee.github.io/DalekCarrdSite/HeaderStatus/MOTD.txt';

  const STATUS_MAP = {
    online:  { icon: '●',  label: 'ONLINE' },
    idle:    { icon: '🌙', label: 'IDLE' },
    dnd:     { icon: '⛔', label: 'BUSY' },
    offline: { icon: '○',  label: 'OFFLINE' }
  };

  const chicagoFormatter = new Intl.DateTimeFormat('en-US', {
    hour: '2-digit', minute: '2-digit',
    hour12: true, timeZone: 'America/Chicago', timeZoneName: 'short'
  });

  function extractParts(formatter, now) {
    const parts = formatter.formatToParts(now);
    let h, m, tz, ampm;
    for (const p of parts) {
      if (p.type === 'hour')              h = p.value;
      else if (p.type === 'minute')       m = p.value;
      else if (p.type === 'timeZoneName') tz = p.value;
      else if (p.type === 'dayPeriod')    ampm = p.value;
    }
    return `${h}<span class="blink">:</span>${m} ${ampm} ${tz}`;
  }

  function updateClock() {
    if (myEl) myEl.innerHTML = 'MY TIME: ' + extractParts(chicagoFormatter, new Date());
  }
  updateClock();
  setInterval(updateClock, 1000);

  function applyStatus(raw) {
    const key  = STATUS_MAP[raw] ? raw : 'offline';
    const info = STATUS_MAP[key];
    badge.dataset.status = key;
    badgeIcon.textContent = info.icon;
    badgeText.textContent = info.label;
  }

  const APP_MAP = [
    { match: ["plex"],                                   icon: "🍿" },
    { match: ["blender"],                                icon: "🎨" },
    { match: ["davinci", "resolve"],                     icon: "🎬" },
    { match: ["figma"],                                  icon: "✏️" },
    { match: ["vs code", "vscode", "visual studio code"],icon: "💻" },
    { match: ["visual studio"],                          icon: "💻" },
    { match: ["discord"],                                icon: "💬" },
  ];

  function getAppIcon(name) {
    const lower = name.toLowerCase();
    for (const entry of APP_MAP) {
      if (entry.match.some(k => lower.includes(k))) return entry.icon;
    }
    return "🎮";
  }

  function showActivity(name, icon) {
    actText.textContent = name;
    actIcon.textContent = icon;
    actBadge.classList.remove("hidden");
  }

  function hideActivity() {
    actBadge.classList.add("hidden");
  }

  function applyActivity(activities) {
    const activity = activities.find(a => a.type === 0 || a.type === 3);
    if (activity) {
      showActivity(activity.name, getAppIcon(activity.name));
    } else {
      hideActivity();
    }
  }

  async function fetchLanyard(id) {
    const res = await fetch(`https://api.lanyard.rest/v1/users/${id}`);
    const json = await res.json();
    return json.data;
  }

  async function refresh() {
    try {
      const [workData, mainData] = await Promise.all([
        fetchLanyard(WORK_ID),
        fetchLanyard(MAIN_ID)
      ]);
      if (workData.discord_status === 'online') {
        applyStatus('dnd');
        showActivity('At Work', '💼');
        return;
      }
      applyStatus(mainData.discord_status);
      if (mainData.discord_status === 'idle') {
        hideActivity();
      } else {
        applyActivity(mainData.activities || []);
      }
    } catch (_) {
      applyStatus('offline');
      hideActivity();
    }
  }

  refresh();
  setInterval(refresh, 60_000);

  async function loadMotd() {
    try {
      const res = await fetch(MOTD_URL, { cache: 'no-store' });
      if (!res.ok) return;
      const text = await res.text();
      const lines = text.split('\n')
        .map(l => l.trim())
        .filter(l => l && !l.startsWith('#'));
      if (!lines.length) return;
      const pick = lines[Math.floor(Math.random() * lines.length)];
      document.getElementById('motd-plain-text').textContent = pick;
      document.getElementById('motd-pill-text').textContent  = pick;
      document.getElementById('motd-plain-row').classList.remove('hidden');
      document.getElementById('motd-pill-row').classList.remove('hidden');
    } catch (_) { /* leave hidden on failure */ }
  }
  loadMotd();
})();
</script>
